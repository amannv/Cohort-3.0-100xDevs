<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Api</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.6/axios.min.js"></script>
</head>
<body>
    <input type="text" id="a" placeholder="Value of a">
    <input type="text" id="b" placeholder="Value of b">

    <button onclick="sendRequest()">Find Sum</button>

    <script>
        async function sendRequest() {
                const a = document.getElementById("a").value;
                const b = document.getElementById("b").value;
                const response = await axios.post("http://localhost:3000/sum",{
                    a: a,
                    b: b
                });  
                console.log(response.data);
        }    

        // serves a folder over http
    </script>
</body>
</html>
