<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script>
</head>
<body>
    <div id="signup-container" display="none">
        <h2>Sign Up</h2>
        <input type="text" placeholder="Username" id="signup-usr" required/>
        <input type="text" placeholder="Password" id="signup-pass" required/>
        <button type="submit" onclick="signup()">Sign Up</button>
        <button onclick="movetoSignIn()">Already have an account? Sign In</button>
    </div>
    <div id="signin-container" display="block">
        <h2>Sign In</h2>
        <input type="text" placeholder="Username" id="signin-usr" required/>
        <input type="text" placeholder="Password" id="signin-pass" required/>
        <button type="submit" onclick="signin()">Sign In</button> 
        <button onclick="movetoSignUp()">Don't have an account? Sign Up</button>
    </div>

    <div id="todoscontainer" display="none">
        <h1>Todo-List</h1>
        <button id="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="todo-input-container">
        <input type="text" placeholder="Type your Todos here..." />
        <button onclick="addTodo()">Add Todo</button>
    </div>

    <div id="todos-list"></div>

    <script src="index.js"></script>
</body>
</html>
